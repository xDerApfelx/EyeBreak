<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>EyeBreak Overlay</title>
    <link rel="stylesheet" href="overlay.css" />
    <script type="module" src="overlay.js" defer></script>
  </head>
  <body>
    <div id="overlay-card" class="overlay-card hidden">
      <div class="overlay-header">
        <span id="overlay-title">EyeBreak</span>
        <span id="overlay-countdown" class="overlay-countdown">--:--</span>
      </div>
      <p id="overlay-hint" class="overlay-hint"></p>
      <div id="overlay-buttons" class="overlay-buttons">
        <button id="btn-snooze" type="button"></button>
        <button id="btn-break-now" type="button"></button>
        <button id="btn-skip" type="button" class="hidden"></button>
      </div>
      <div class="duochrome" role="presentation">
        <span class="duo-red"></span><span class="duo-green"></span>
      </div>
    </div>
  </body>
</html>
